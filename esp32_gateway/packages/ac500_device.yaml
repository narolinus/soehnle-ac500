switch:
  - platform: template
    id: ${ac500_id_prefix}_power
    name: "${ac500_name} Power"
    device_id: ${ac500_device_id}
    icon: mdi:power
    turn_on_action:
      - script.execute: ${ac500_id_prefix}_ensure_connected
      - script.wait: ${ac500_id_prefix}_ensure_connected
      - script.execute: ${ac500_id_prefix}_enter_control_mode
      - script.wait: ${ac500_id_prefix}_enter_control_mode
      - lambda: |-
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0x01, 0x00, 0x01)) {
            ESP_LOGW("soehnle_ac500", "%s: Power on fehlgeschlagen", "${ac500_name}");
          }
      - script.execute: ${ac500_id_prefix}_post_command_refresh
      - script.wait: ${ac500_id_prefix}_post_command_refresh
    turn_off_action:
      - script.execute: ${ac500_id_prefix}_ensure_connected
      - script.wait: ${ac500_id_prefix}_ensure_connected
      - script.execute: ${ac500_id_prefix}_enter_control_mode
      - script.wait: ${ac500_id_prefix}_enter_control_mode
      - lambda: |-
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0x01, 0x00, 0x00)) {
            ESP_LOGW("soehnle_ac500", "%s: Power off fehlgeschlagen", "${ac500_name}");
          }
      - script.execute: ${ac500_id_prefix}_post_command_refresh
      - script.wait: ${ac500_id_prefix}_post_command_refresh

  - platform: template
    id: ${ac500_id_prefix}_uv
    name: "${ac500_name} UV-C"
    device_id: ${ac500_device_id}
    icon: mdi:lightbulb-cfl
    turn_on_action:
      - script.execute: ${ac500_id_prefix}_ensure_connected
      - script.wait: ${ac500_id_prefix}_ensure_connected
      - script.execute: ${ac500_id_prefix}_enter_control_mode
      - script.wait: ${ac500_id_prefix}_enter_control_mode
      - lambda: |-
