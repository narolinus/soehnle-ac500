select:
  - platform: template
    id: ${ac500_id_prefix}_fan_mode
    name: "${ac500_name} Fan Mode"
    device_id: ${ac500_device_id}
    icon: mdi:fan
    options:
      - "Low"
      - "Medium"
      - "High"
      - "Turbo"
    set_action:
      - script.execute: ${ac500_id_prefix}_ensure_connected
      - script.wait: ${ac500_id_prefix}_ensure_connected
      - script.execute: ${ac500_id_prefix}_enter_control_mode
      - script.wait: ${ac500_id_prefix}_enter_control_mode
      - if:
          condition:
            lambda: |-
              return (id(${ac500_id_prefix}_flags_raw) & 0x20U) != 0;
          then:
            - lambda: |-
                if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0x05, 0x00, 0x00)) {
                  ESP_LOGW("soehnle_ac500", "%s: Auto off vor Fan-Wechsel fehlgeschlagen", "${ac500_name}");
                }
            - delay: 250ms
      - lambda: |-
          const uint8_t fan = soehnle_ac500::fan_value_from_label(x);
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0x02, 0x00, fan)) {
            ESP_LOGW("soehnle_ac500", "%s: Fan-Wechsel fehlgeschlagen", "${ac500_name}");
          }
      - script.execute: ${ac500_id_prefix}_post_command_refresh
      - script.wait: ${ac500_id_prefix}_post_command_refresh

  - platform: template
    id: ${ac500_id_prefix}_timer
    name: "${ac500_name} Timer"
    device_id: ${ac500_device_id}
    icon: mdi:timer-outline
    options:
      - "Off"
      - "2 h"
      - "4 h"
      - "8 h"
    set_action:
      - script.execute: ${ac500_id_prefix}_ensure_connected
      - script.wait: ${ac500_id_prefix}_ensure_connected
      - script.execute: ${ac500_id_prefix}_enter_control_mode
      - script.wait: ${ac500_id_prefix}_enter_control_mode
      - lambda: |-
          const uint8_t timer = soehnle_ac500::timer_value_from_label(x);
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0x04, 0x00, timer)) {
            ESP_LOGW("soehnle_ac500", "%s: Timer-Wechsel fehlgeschlagen", "${ac500_name}");
          }
      - script.execute: ${ac500_id_prefix}_post_command_refresh
      - script.wait: ${ac500_id_prefix}_post_command_refresh

button:
  - platform: template
    name: "${ac500_name} Pair"
    device_id: ${ac500_device_id}
    icon: mdi:bluetooth-connect
    entity_category: config
    on_press:
      then:
        - logger.log: "${ac500_name}: Pairing gestartet, jetzt Bluetooth-Taste am Geraet druecken"
        - lambda: |-
            id(${ac500_id_prefix}_pair_ack_seen) = false;
            id(${ac500_id_prefix}_pair_in_progress) = true;
        - text_sensor.template.publish:
            id: ${ac500_id_prefix}_state
            state: "pairing"
        - script.execute: ${ac500_id_prefix}_ensure_connected
        - script.wait: ${ac500_id_prefix}_ensure_connected
        - lambda: |-
            if (!soehnle_ac500::ensure_ble_link_paired(id(${ac500_ble_client_id}))) {
              ESP_LOGW("soehnle_ac500", "%s: BLE-Link-Pairing konnte nicht gestartet werden", "${ac500_name}");
            }
        - delay: 500ms
        - lambda: |-
            ESP_LOGI(
                "soehnle_ac500",
                "%s: BLE-Link gepairt=%s",
                "${ac500_name}",
                id(${ac500_ble_client_id}).is_paired() ? "ja" : "nein");
        - lambda: |-
            if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0xA2, 0x00, 0x03)) {
              ESP_LOGW("soehnle_ac500", "%s: Pairing-Request fehlgeschlagen", "${ac500_name}");
            }
        - delay: 20s
        - if:
            condition:
              lambda: |-
                return id(${ac500_id_prefix}_pair_in_progress);
            then:
              - lambda: |-
                  id(${ac500_id_prefix}_pair_in_progress) = false;
              - text_sensor.template.publish:
                  id: ${ac500_id_prefix}_state
                  state: "pair_timeout"
              - logger.log: "${ac500_name}: Kein Pairing-Ack empfangen"

  - platform: template
    name: "${ac500_name} Refresh"
    device_id: ${ac500_device_id}
    icon: mdi:refresh
    entity_category: diagnostic
    on_press:
      then:
        - logger.log: "${ac500_name}: Refresh angefordert"
        - script.execute: ${ac500_id_prefix}_ensure_connected
        - script.wait: ${ac500_id_prefix}_ensure_connected
        - script.execute: ${ac500_id_prefix}_enter_control_mode
        - script.wait: ${ac500_id_prefix}_enter_control_mode
        - script.execute: ${ac500_id_prefix}_request_status
        - script.wait: ${ac500_id_prefix}_request_status

  - platform: template
    name: "${ac500_name} Reconnect"
    device_id: ${ac500_device_id}
    icon: mdi:bluetooth-transfer
    entity_category: diagnostic
    on_press:
      then:
        - logger.log: "${ac500_name}: Reconnect angefordert"
        - ble_client.disconnect: ${ac500_ble_client_id}
        - delay: 500ms
        - script.execute: ${ac500_id_prefix}_ensure_connected
        - script.wait: ${ac500_id_prefix}_ensure_connected

interval:
  - interval: 20s
    then:
      - if:
          condition:
            lambda: |-
              return id(${ac500_id_prefix}_connected).state &&
                     !id(${ac500_id_prefix}_pair_in_progress) &&
                     (millis() - id(${ac500_id_prefix}_last_status_ms) > 5000U);
          then:
            - script.execute: ${ac500_id_prefix}_request_status
            - script.wait: ${ac500_id_prefix}_request_status
