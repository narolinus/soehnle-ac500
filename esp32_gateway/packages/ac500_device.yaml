globals:
  - id: ${ac500_id_prefix}_pair_ack_seen
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ${ac500_id_prefix}_pair_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ${ac500_id_prefix}_have_status
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ${ac500_id_prefix}_frame_variant
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: ${ac500_id_prefix}_fan_raw
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: ${ac500_id_prefix}_timer_raw
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: ${ac500_id_prefix}_flags_raw
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: ${ac500_id_prefix}_status_frame_counter
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: ${ac500_id_prefix}_status_wait_from
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: ${ac500_id_prefix}_last_status_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

script:
  - id: ${ac500_id_prefix}_ensure_connected
    mode: restart
    then:
      - if:
          condition:
            binary_sensor.is_off: ${ac500_id_prefix}_connected
          then:
            - text_sensor.template.publish:
                id: ${ac500_id_prefix}_state
                state: "waiting_for_auto_connect"
            - wait_until:
                condition:
                  binary_sensor.is_on: ${ac500_id_prefix}_connected
                timeout: 10s

  - id: ${ac500_id_prefix}_enter_control_mode
    mode: restart
    then:
      - lambda: |-
          if (!id(${ac500_ble_client_id}).is_paired()) {
            ESP_LOGW(
                "soehnle_ac500",
                "%s: BLE-Link nicht gepairt, Datenkanal ok aber Control-Session evtl. nicht autorisiert",
                "${ac500_name}");
          }
      - lambda: |-
          id(${ac500_id_prefix}_status_wait_from) = id(${ac500_id_prefix}_status_frame_counter);
      - lambda: |-
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0xAF, 0x00, 0x01)) {
            ESP_LOGW("soehnle_ac500", "%s: AF 00 01 Write fehlgeschlagen", "${ac500_name}");
          }
      - delay: 120ms
      - lambda: |-
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0xAF, 0x00, 0x01)) {
            ESP_LOGW("soehnle_ac500", "%s: zweites AF 00 01 Write fehlgeschlagen", "${ac500_name}");
          }
      - wait_until:
          condition:
            lambda: |-
              return id(${ac500_id_prefix}_status_frame_counter) != id(${ac500_id_prefix}_status_wait_from);
          timeout: 2s
      - lambda: |-
          if (id(${ac500_id_prefix}_status_frame_counter) == id(${ac500_id_prefix}_status_wait_from)) {
            ESP_LOGW("soehnle_ac500", "%s: kein frischer Live-Frame nach Control-Mode", "${ac500_name}");
          }
      - delay: 200ms

  - id: ${ac500_id_prefix}_initialize_session
    mode: restart
    then:
      - lambda: |-
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0xAF, 0x00, 0x01)) {
            ESP_LOGW("soehnle_ac500", "%s: Initiales AF 00 01 Write fehlgeschlagen", "${ac500_name}");
          }
      - delay: 200ms
      - script.execute: ${ac500_id_prefix}_request_status
      - script.wait: ${ac500_id_prefix}_request_status

  - id: ${ac500_id_prefix}_request_status
    mode: restart
    then:
      - lambda: |-
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0xA2, 0x00, 0x03)) {
            ESP_LOGW("soehnle_ac500", "%s: Status-Request fehlgeschlagen", "${ac500_name}");
          }

  - id: ${ac500_id_prefix}_post_command_refresh
    mode: restart
    then:
      - lambda: |-
          id(${ac500_id_prefix}_status_wait_from) = id(${ac500_id_prefix}_status_frame_counter);
      - wait_until:
          condition:
            lambda: |-
              return id(${ac500_id_prefix}_status_frame_counter) != id(${ac500_id_prefix}_status_wait_from);
          timeout: 2s
      - if:
          condition:
            lambda: |-
              return id(${ac500_id_prefix}_status_frame_counter) == id(${ac500_id_prefix}_status_wait_from);
          then:
            - script.execute: ${ac500_id_prefix}_request_status
            - script.wait: ${ac500_id_prefix}_request_status
            - wait_until:
                condition:
                  lambda: |-
                    return id(${ac500_id_prefix}_status_frame_counter) != id(${ac500_id_prefix}_status_wait_from);
                timeout: 3s
            - lambda: |-
                if (id(${ac500_id_prefix}_status_frame_counter) == id(${ac500_id_prefix}_status_wait_from)) {
                  ESP_LOGW("soehnle_ac500", "%s: kein frischer Status nach Kommando", "${ac500_name}");
                }

  - id: ${ac500_id_prefix}_finish_pairing
    mode: restart
    then:
      - lambda: |-
          if (!soehnle_ac500::write_command(id(${ac500_ble_client_id}), 0xA2, 0x00, 0x01)) {
            ESP_LOGW("soehnle_ac500", "%s: Pairing-Abschluss fehlgeschlagen", "${ac500_name}");
          }
      - lambda: |-
          id(${ac500_id_prefix}_pair_in_progress) = false;
      - text_sensor.template.publish:
          id: ${ac500_id_prefix}_state
          state: "paired"
      - logger.log: "${ac500_name}: Pairing abgeschlossen, laufende Live-Session bleibt bestehen"

ble_client:
  - mac_address: ${ac500_mac}
    id: ${ac500_ble_client_id}
    auto_connect: true
    on_connect:
      then:
        - logger.log: "${ac500_name}: BLE verbunden"
        - lambda: |-
            ESP_LOGI(
                "soehnle_ac500",
                "%s: BLE-Link gepairt=%s",
                "${ac500_name}",
                id(${ac500_ble_client_id}).is_paired() ? "ja" : "nein");
        - binary_sensor.template.publish:
            id: ${ac500_id_prefix}_connected
            state: ON
        - text_sensor.template.publish:
            id: ${ac500_id_prefix}_state
            state: "connected"
    on_disconnect:
      then:
        - logger.log: "${ac500_name}: BLE getrennt"
        - binary_sensor.template.publish:
            id: ${ac500_id_prefix}_connected
            state: OFF
        - text_sensor.template.publish:
            id: ${ac500_id_prefix}_state
            state: "disconnected"

sensor:
  - platform: template
    id: ${ac500_id_prefix}_pm25
    name: "${ac500_name} PM2.5"
    device_id: ${ac500_device_id}
    device_class: pm25
    state_class: measurement
    unit_of_measurement: "μg/m³"
    accuracy_decimals: 1
    icon: mdi:molecule
    update_interval: never

  - platform: template
    id: ${ac500_id_prefix}_temperature
    name: "${ac500_name} Temperature"
    device_id: ${ac500_device_id}
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: never

  - platform: template
    id: ${ac500_id_prefix}_filter_percent
    name: "${ac500_name} Filter"
    device_id: ${ac500_device_id}
    state_class: measurement
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: mdi:air-filter
    update_interval: never

  - platform: ble_client
    type: rssi
    ble_client_id: ${ac500_ble_client_id}
    name: "${ac500_name} RSSI"
    device_id: ${ac500_device_id}
    device_class: signal_strength
    entity_category: diagnostic
    unit_of_measurement: "dBm"
    accuracy_decimals: 0
    update_interval: 30s

  - platform: ble_client
    id: ${ac500_id_prefix}_live_notifications
    ble_client_id: ${ac500_ble_client_id}
    type: characteristic
    service_uuid: 0000ffa0-0000-1000-8000-00805f9b34fb
    characteristic_uuid: 0000ef02-0000-1000-8000-00805f9b34fb
    notify: true
    update_interval: never
    internal: true
    lambda: |-
      id(${ac500_id_prefix}_last_frame).publish_state(soehnle_ac500::to_hex(x));
      soehnle_ac500::Status status;
      if (!soehnle_ac500::parse_live_frame(x, &status)) {
        id(${ac500_id_prefix}_state).publish_state("live_parse_failed");
        return {};
      }

      id(${ac500_id_prefix}_have_status) = true;
      id(${ac500_id_prefix}_status_frame_counter)++;
      id(${ac500_id_prefix}_last_status_ms) = millis();
      id(${ac500_id_prefix}_frame_variant) = status.frame_variant;
      id(${ac500_id_prefix}_fan_raw) = status.fan_raw;
      id(${ac500_id_prefix}_timer_raw) = status.timer_raw;
      id(${ac500_id_prefix}_flags_raw) = status.flags_raw;

      id(${ac500_id_prefix}_pm25).publish_state(status.pm25_ug_m3);
      id(${ac500_id_prefix}_temperature).publish_state(status.temperature_c);
      id(${ac500_id_prefix}_filter_percent).publish_state(status.filter_percent);

      id(${ac500_id_prefix}_power).publish_state(status.power_enabled());
      id(${ac500_id_prefix}_uv).publish_state(status.uv_enabled());
      id(${ac500_id_prefix}_auto).publish_state(status.auto_enabled());
      id(${ac500_id_prefix}_night).publish_state(status.night_enabled());
      id(${ac500_id_prefix}_buzzer).publish_state(status.buzzer_enabled());
      id(${ac500_id_prefix}_connected).publish_state(true);
      if (!id(${ac500_id_prefix}_pair_in_progress)) {
        id(${ac500_id_prefix}_state).publish_state("status_received");
      }

      const std::string fan_mode = soehnle_ac500::fan_label(status.fan_raw);
      if (!fan_mode.empty()) {
        id(${ac500_id_prefix}_fan_mode).publish_state(fan_mode);
      }

      const std::string timer_mode = soehnle_ac500::timer_label(status.timer_raw);
      if (!timer_mode.empty()) {
        id(${ac500_id_prefix}_timer).publish_state(timer_mode);
      }
      return status.pm25_ug_m3;

  - platform: ble_client
    id: ${ac500_id_prefix}_ack_notifications
    ble_client_id: ${ac500_ble_client_id}
    type: characteristic
    service_uuid: 0000ffa0-0000-1000-8000-00805f9b34fb
    characteristic_uuid: 0000ef03-0000-1000-8000-00805f9b34fb
    notify: true
    update_interval: never
    internal: true
    lambda: |-
      id(${ac500_id_prefix}_last_ack).publish_state(soehnle_ac500::to_hex(x));
      if (soehnle_ac500::is_pair_ack(x)) {
        id(${ac500_id_prefix}_pair_ack_seen) = true;
        id(${ac500_id_prefix}_state).publish_state("pair_ack");
        ESP_LOGI("soehnle_ac500", "%s: Pairing-Ack empfangen", "${ac500_name}");
        if (id(${ac500_id_prefix}_pair_in_progress)) {
          id(${ac500_id_prefix}_finish_pairing).execute();
        }
      } else {
        id(${ac500_id_prefix}_state).publish_state("ack_notify");
      }
      return {};

binary_sensor:
  - platform: template
    id: ${ac500_id_prefix}_connected
    name: "${ac500_name} Connected"
    device_id: ${ac500_device_id}
